general:
  debug: false
  prefix: "&8[&bHadesGuard&8] "

punishments:
  alert:
    enabled: true
    threshold: 5
    cooldown-ms: 3000
  kick:
    enabled: true
    threshold: 20
    message: "&cyou have been kicked by HadesGuard\n&7reason &f{check}"
